      <stop offset="0" stop-color="#0d1030"/><stop offset="1" stop-color="#0a0714"/>
    </linearGradient>
    <linearGradient id="di-ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#di-bg)"/>
  <g opacity="0.4" stroke="#ffffff" stroke-width="0.5">
    <path d="M0 60 H600 M0 120 H600 M0 180 H600 M0 240 H600 M0 300 H600"/>
  </g>
  <!-- input document -->
  <rect x="34" y="120" width="90" height="120" rx="8" fill="#12152e" stroke="#3a3f66"/>
  <g stroke="#5b6188" stroke-width="4" stroke-linecap="round">
    <path d="M50 148 H108"/><path d="M50 164 H108"/><path d="M50 180 H92"/><path d="M50 196 H108"/><path d="M50 212 H80"/>
  </g>
  <text x="79" y="262" fill="#969ab5" font-size="11" text-anchor="middle">Unstructured PDF</text>
  <!-- flow arrows -->
  <path d="M130 180 H176" stroke="url(#di-ac)" stroke-width="2" marker-end="url(#a)"/>
