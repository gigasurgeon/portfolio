  <path d="M474 180 H516" stroke="url(#di-ac)" stroke-width="2"/>
  <rect x="518" y="140" width="52" height="80" rx="8" fill="#0f2f2a" stroke="#34d399"/>
  <g stroke="#34d399" stroke-width="3" stroke-linecap="round"><path d="M530 162 H558"/><path d="M530 176 H552"/><path d="M530 190 H558"/></g>
  <text x="544" y="238" fill="#34d399" font-size="10" text-anchor="middle">JSON</text>
  <text x="300" y="330" fill="#6a6f8c" font-size="11" text-anchor="middle">Multi-agent text + visual reasoning · 80K+ PDFs/day · 99.85% accuracy</text>
