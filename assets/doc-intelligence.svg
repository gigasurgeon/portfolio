  <g>
    <rect x="180" y="70" width="150" height="52" rx="10" fill="#151833" stroke="#7c5cff" opacity="0.95"/>
    <circle cx="204" cy="96" r="8" fill="#7c5cff"/><text x="222" y="100" fill="#e7e9f3" font-size="12">OCR Agent</text>
    <rect x="180" y="154" width="150" height="52" rx="10" fill="#151833" stroke="#22d3ee"/>
    <circle cx="204" cy="180" r="8" fill="#22d3ee"/><text x="222" y="184" fill="#e7e9f3" font-size="12">Vision VLM</text>
    <rect x="180" y="238" width="150" height="52" rx="10" fill="#151833" stroke="#f472b6"/>
    <circle cx="204" cy="264" r="8" fill="#f472b6"/><text x="222" y="268" fill="#e7e9f3" font-size="12">Reasoning LLM</text>
  </g>
  <!-- merge to orchestrator -->
  <path d="M330 96 C380 96 380 180 410 180" stroke="#7c5cff" stroke-width="1.6" opacity="0.7"/>
  <path d="M330 180 H410" stroke="#22d3ee" stroke-width="1.6" opacity="0.7"/>
  <path d="M330 264 C380 264 380 180 410 180" stroke="#f472b6" stroke-width="1.6" opacity="0.7"/>
  <rect x="412" y="150" width="60" height="60" rx="12" fill="#1a1e3d" stroke="url(#di-ac)" stroke-width="1.5"/>
  <text x="442" y="176" fill="#e7e9f3" font-size="10" text-anchor="middle">tool</text>
  <text x="442" y="190" fill="#e7e9f3" font-size="10" text-anchor="middle">calling</text>
