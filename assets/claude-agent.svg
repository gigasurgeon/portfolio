<svg viewBox="0 0 600 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1030"/><stop offset="1" stop-color="#0a0714"/></linearGradient>
    <linearGradient id="ca-ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#7c5cff"/></linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#ca-bg)"/>
  <g opacity="0.35" stroke="#ffffff" stroke-width="0.5"><path d="M0 72 H600 M0 144 H600 M0 216 H600 M0 288 H600"/></g>
  <!-- triggers -->
  <g font-size="11" fill="#e7e9f3">
    <rect x="26" y="70" width="120" height="38" rx="9" fill="#151833" stroke="#7c5cff"/><text x="42" y="93">PR opened</text>
    <rect x="26" y="160" width="120" height="38" rx="9" fill="#151833" stroke="#22d3ee"/><text x="42" y="183">incident alert</text>
    <rect x="26" y="250" width="120" height="38" rx="9" fill="#151833" stroke="#f472b6"/><text x="42" y="273">webhook</text>
  </g>
  <path d="M146 89 C190 89 190 165 224 165" stroke="#3a3f66" stroke-width="1.4"/>
  <path d="M146 179 H224" stroke="#3a3f66" stroke-width="1.4"/>
  <path d="M146 269 C190 269 190 193 224 193" stroke="#3a3f66" stroke-width="1.4"/>
  <!-- agent core -->
  <rect x="226" y="128" width="120" height="100" rx="14" fill="#1a1e3d" stroke="url(#ca-ac)" stroke-width="1.6"/>
  <circle cx="286" cy="160" r="12" fill="none" stroke="#f472b6" stroke-width="2"/>
  <path d="M281 160 h10 M286 155 v10" stroke="#f472b6" stroke-width="2"/>
  <text x="286" y="196" fill="#e7e9f3" font-size="11" text-anchor="middle">Claude</text>
  <text x="286" y="211" fill="#e7e9f3" font-size="11" text-anchor="middle">Agent SDK</text>
  <!-- loop of tools/subagents -->
  <g font-size="10" fill="#e7e9f3">
    <rect x="392" y="70" width="150" height="36" rx="8" fill="#151833" stroke="#34d399"/><text x="408" y="93">read diff · files</text>
    <rect x="392" y="118" width="150" height="36" rx="8" fill="#151833" stroke="#22d3ee"/><text x="408" y="141">run tests / logs</text>
    <rect x="392" y="166" width="150" height="36" rx="8" fill="#151833" stroke="#7c5cff"/><text x="408" y="189">spawn subagents</text>
    <rect x="392" y="214" width="150" height="36" rx="8" fill="#151833" stroke="#fbbf24"/><text x="408" y="237">post review / fix</text>
  </g>
  <g stroke-width="1.5" opacity="0.8">
    <path d="M346 150 C370 150 370 88 392 88" stroke="#34d399"/>
    <path d="M346 165 C370 165 370 136 392 136" stroke="#22d3ee"/>
    <path d="M346 180 C370 180 370 184 392 184" stroke="#7c5cff"/>
    <path d="M346 205 C370 205 370 232 392 232" stroke="#fbbf24"/>
  </g>
  <!-- feedback loop arrow -->
  <path d="M467 250 C467 300 300 300 286 300 286 300 286 250 286 232" stroke="url(#ca-ac)" stroke-width="1.4" stroke-dasharray="4 4" opacity="0.7"/>
  <text x="300" y="322" fill="#6a6f8c" font-size="11" text-anchor="middle">agentic loop</text>
  <text x="286" y="118" fill="#6a6f8c" font-size="10" text-anchor="middle">tool-calling</text>
  <text x="300" y="348" fill="#6a6f8c" font-size="11" text-anchor="middle">Automated PR reviews · incident triage · webhook workflows</text>
</svg>
