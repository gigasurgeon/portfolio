    <rect x="440" y="198" width="130" height="34" rx="7" fill="#151833" stroke="#f472b6"/><text x="456" y="220" fill="#e7e9f3">TensorRT / ONNX</text>
    <rect x="440" y="252" width="130" height="52" rx="7" fill="#0f2f2a" stroke="#34d399"/>
