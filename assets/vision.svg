  <line x1="420" y1="180" x2="440" y2="180" stroke="#3a3f66"/>
  <text x="300" y="348" fill="#6a6f8c" font-size="11" text-anchor="middle">Real-time sports analytics · detection · tracking · pose · court localization</text>
