  <g stroke="#34d399" stroke-width="1.5"><path d="M142 130 V150 M142 150 L132 165 M142 150 L152 165 M142 150 L136 188 M142 150 L148 188"/></g>
  <!-- side panel: pipeline stages -->
  <g font-size="12">
    <rect x="440" y="60" width="130" height="34" rx="7" fill="#151833" stroke="#7c5cff"/><text x="456" y="82" fill="#e7e9f3">YOLOv9 detect</text>
    <rect x="440" y="106" width="130" height="34" rx="7" fill="#151833" stroke="#22d3ee"/><text x="456" y="128" fill="#e7e9f3">Multi-obj track</text>
