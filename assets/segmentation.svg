<svg viewBox="0 0 600 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="sg-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1030"/><stop offset="1" stop-color="#0a0714"/></linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#sg-bg)"/>
  <!-- input satellite tile -->
  <g transform="translate(40,52)">
    <rect width="200" height="200" rx="8" fill="#0f1226" stroke="#2a2f52"/>
    <!-- terrain blocks -->
    <rect x="14" y="14" width="70" height="54" fill="#1e2b1a"/>
    <rect x="92" y="14" width="94" height="40" fill="#22304a"/>
    <path d="M14 90 H186 M14 132 H186" stroke="#33405f" stroke-width="8"/>
    <rect x="20" y="150" width="46" height="38" fill="#3a2f1c"/>
    <rect x="80" y="150" width="40" height="38" fill="#3a2f1c"/>
    <rect x="132" y="150" width="46" height="38" fill="#3a2f1c"/>
    <text x="100" y="216" fill="#969ab5" font-size="11" text-anchor="middle">satellite tile</text>
  </g>
  <!-- model -->
  <g transform="translate(258,120)">
    <path d="M0 0 L54 22 V82 L0 104 Z" fill="#151833" stroke="#7c5cff"/>
    <path d="M0 26 L54 40 M0 52 L54 58 M0 78 L54 76" stroke="#7c5cff" stroke-width="1" opacity="0.6"/>
    <text x="27" y="130" fill="#e7e9f3" font-size="10" text-anchor="middle">HRNet / ViT</text>
  </g>
  <path d="M244 152 H256" stroke="#22d3ee" stroke-width="2"/>
  <path d="M314 162 H332" stroke="#22d3ee" stroke-width="2"/>
  <!-- segmented output -->
  <g transform="translate(334,52)">
    <rect width="200" height="200" rx="8" fill="#0f1226" stroke="#2a2f52"/>
    <rect x="14" y="14" width="70" height="54" fill="#34d399" opacity="0.85"/>
    <rect x="92" y="14" width="94" height="40" fill="#22d3ee" opacity="0.85"/>
    <path d="M14 90 H186 M14 132 H186" stroke="#f472b6" stroke-width="8" opacity="0.9"/>
    <rect x="20" y="150" width="46" height="38" fill="#fbbf24" opacity="0.85"/>
    <rect x="80" y="150" width="40" height="38" fill="#fbbf24" opacity="0.85"/>
    <rect x="132" y="150" width="46" height="38" fill="#fbbf24" opacity="0.85"/>
    <text x="100" y="216" fill="#969ab5" font-size="11" text-anchor="middle">segmentation mask</text>
  </g>
  <!-- legend -->
  <g font-size="10" fill="#969ab5">
    <rect x="40" y="300" width="12" height="12" fill="#34d399"/><text x="58" y="310">vegetation</text>
    <rect x="150" y="300" width="12" height="12" fill="#22d3ee"/><text x="168" y="310">building</text>
    <rect x="250" y="300" width="12" height="12" fill="#f472b6"/><text x="268" y="310">road</text>
    <rect x="330" y="300" width="12" height="12" fill="#fbbf24"/><text x="348" y="310">parcel</text>
    <text x="440" y="310" fill="#34d399">+12% accuracy</text>
  </g>
</svg>
